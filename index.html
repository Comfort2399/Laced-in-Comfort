<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Booking Page</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #111;
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: #1c1c1c;
        padding: 25px;
        border-radius: 12px;
        width: 350px;
    }

    h2 {
        text-align: center;
        color: pink;
    }

    input, select, button {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border-radius: 8px;
        border: none;
    }

    button {
        background: pink;
        color: black;
        font-weight: bold;
        cursor: pointer;
    }

    button:hover {
        background: hotpink;
    }
</style>
</head>

<body>

<div class="container">
    <h2>Book Appointment</h2>

    <input type="text" id="name" placeholder="Your Name">

    <select id="service">
        <option value="Basic installation - R200">Basic installation - R200</option>
        <option value="Frontal ponytail - R650">Frontal ponytail - R650</option>
        <option value="Wig wash - R80">Wig wash - R80</option>
        <option value="Wig revamp - R120">Wig revamp - R120</option>
        <option value="Wig customisation - R200">Wig customisation - R200</option>
        <option value="Glue wash - R50">Glue wash - R50</option>
        <option value="Ponytail - R150">Ponytail - R150</option>
        <option value="Waterfall ponytail - R200">Waterfall ponytail - R200</option>
        <option value="Cluster lashes - R100">Cluster lashes - R100</option>
        <option value="Volume lashes - +R30">Volume lashes - +R30</option>
        <option value="Lashes removal - R20">Lashes removal - R20</option>
        <option value="Lashes refill - R50">Lashes refill - R50</option>
    </select>

    <input type="date" id="date">
    <input type="time" id="time">

    <button onclick="bookNow()">Book via WhatsApp</button>
</div>

<script>
function bookNow() {
    let name = document.getElementById("name").value;
    let service = document.getElementById("service").value;
    let date = document.getElementById("date").value;
    let time = document.getElementById("time").value;

    if (!name || !date || !time) {
        alert("Please fill in all fields");
        return;
    }

    let message = 
`Hello, I would like to book an appointment:%0A
Name: ${name}%0A
Service: ${service}%0A
Date: ${date}%0A
Time: ${time}`;

    let phoneNumber = "+27763977092";

    let url = "https://wa.me/" + phoneNumber + "?text=" + message;

    window.open(url, "_blank");
}
</script>

</body>
</html>
